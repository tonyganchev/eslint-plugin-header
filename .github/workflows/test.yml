name: Test
permissions:
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_call:
    inputs:
      ref:
        description: 'The branch, tag or SHA to checkout'
        required: false
        type: string

jobs:

  run-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [eslint, markdownlint, unit, e2e]
    steps:
    - uses: actions/checkout@v5
      with:
        ref: ${{ inputs.ref || github.ref }}
    
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.32.1

    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24.x'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run ${{ matrix.task }}
      run: pnpm ${{ matrix.task }}

  ecosystem-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:

          - repo: angular/angular-cli
            pm: pnpm
            install: pnpm install --no-frozen-lockfile
            plugin_add: pnpm add -Dw
            run: pnpm run lint

          - repo: Azure/azure-dev
            pm: npm
            cwd: ext/vscode
            install: npm install
            plugin_add: npm install --save-dev
            pkg: "eslint-plugin-header@file:$GITHUB_WORKSPACE/plugin/$TARBALL_PATH @tony.ganchev/eslint-plugin-header@file:$GITHUB_WORKSPACE/plugin/$TARBALL_PATH"
            run: npm run lint
            
          - repo: cloudscape-design/collection-hooks
            pm: npm
            install: npm install
            plugin_add: npm install --save-dev
            run: npm run lint

          - repo: cloudscape-design/component-toolkit
            pm: npm
            install: npm install
            plugin_add: npm install --save-dev
            run: npm run lint

          - repo: cloudscape-design/components
            pm: npm
            install: npm install
            plugin_add: npm install --save-dev
            run: npm run quick-build && npm run lint

          - repo: cloudscape-design/global-styles
            pm: npm
            install: npm install
            plugin_add: npm install --save-dev
            run: npm run lint

          - repo: cloudscape-design/test-utils
            pm: npm
            install: npm install
            plugin_add: npm install --save-dev
            run: npm run lint

          - repo: cloudscape-design/build-tools
            pm: npm
            install: npm install
            plugin_add: npm install --save-dev
            run: npm run lint

          - repo: cloudscape-design/theming-core
            pm: npm
            install: npm install
            plugin_add: npm install --save-dev
            run: npm run lint

          - repo: Cratis/Chronicle
            pm: yarn
            cwd: Source/Workbench
            install: yarn install
            plugin_add: yarn add -D
            run: yarn lint

          - repo: dash0hq/opentelemetry-js-distribution
            pm: npm
            install: npm install
            plugin_add: npm install --save-dev
            run: npm run lint

          - repo: forcedotcom/salesforcedx-vscode
            pm: npm
            install: npm install
            plugin_add: npm install --save-dev
            run: npm run lint

          - repo: eclipse-glsp/glsp
            pm: yarn
            install: yarn
            plugin_add: yarn add -D --ignore-workspace-root-check
            run: yarn lint

          - repo: eclipse-glsp/glsp-client
            pm: yarn
            install: yarn
            plugin_add: yarn add -D --ignore-workspace-root-check
            post_install: >
              node -e "
              const p = require('./package.json');
              p.resolutions = p.resolutions || {};
              p.resolutions['@tony.ganchev/eslint-plugin-header'] =
                'file:' + process.env.GITHUB_WORKSPACE + '/plugin/' + process.env.TARBALL_PATH;
              require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2));
              " && yarn
            run: yarn lint

          - repo: eclipse-glsp/glsp-server-node
            pm: yarn
            install: yarn
            plugin_add: yarn add -D --ignore-workspace-root-check
            post_install: >
              node -e "
              const p = require('./package.json');
              p.resolutions = p.resolutions || {};
              p.resolutions['@tony.ganchev/eslint-plugin-header'] =
                'file:' + process.env.GITHUB_WORKSPACE + '/plugin/' + process.env.TARBALL_PATH;
              require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2));
              " && yarn
            run: yarn lint

          - repo: eclipse-glsp/glsp-theia-integration
            pm: yarn
            install: yarn
            plugin_add: yarn add -D --ignore-workspace-root-check
            post_install: >
              node -e "
              const p = require('./package.json');
              p.resolutions = p.resolutions || {};
              p.resolutions['@tony.ganchev/eslint-plugin-header'] =
                'file:' + process.env.GITHUB_WORKSPACE + '/plugin/' + process.env.TARBALL_PATH;
              require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2));
              " && yarn
            run: yarn lint

          - repo: eclipse-glsp/glsp-vscode-integration
            pm: yarn
            install: yarn
            plugin_add: yarn add -D --ignore-workspace-root-check
            post_install: >
              node -e "
              const p = require('./package.json');
              p.resolutions = p.resolutions || {};
              p.resolutions['@tony.ganchev/eslint-plugin-header'] =
                'file:' + process.env.GITHUB_WORKSPACE + '/plugin/' + process.env.TARBALL_PATH;
              require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2));
              " && yarn
            run: yarn lint

          - repo: leppa/convert-to-wealthfolio
            pm: npm
            install: npm install
            plugin_add: npm install --save-dev
            run: |
              echo "<!--" > temp.txt
              echo "Copyright (c) 2026 Oleksii Serdiuk" >> temp.txt
              echo "SPDX-License-Identifier: BSD-3-Clause" >> temp.txt
              echo "-->" >> temp.txt  
              cat target-repo/CODE_OF_CONDUCT.md >> temp.txt
              mv temp.txt target-repo/CODE_OF_CONDUCT.md
              npm run lint

          - repo: microsoft/compose-language-service
            pm: npm
            install: npm install
            plugin_add: npm install --save-dev
            run: npm run lint

          - repo: microsoft/kiota-typescript
            pm: npm
            install: npm install && npm run build
            plugin_add: npm install --save-dev
            run: npm run lint
            
          - repo: microsoft/vscode-azurecontainerapps
            pm: npm
            install: npm install
            plugin_add: npm install --save-dev
            run: npm run lint

          - repo: microsoft/vscode-azureresourcegroups
            pm: npm
            install: npm install
            plugin_add: npm install --save-dev
            run: npm run lint

          - repo: microsoft/vscode-azurefunctions
            pm: npm
            install: npm install
            plugin_add: npm install --save-dev
            run: npm run lint

          - repo: microsoft/vscode-azurestaticwebapps
            pm: npm
            install: npm install
            plugin_add: npm install --save-dev
            run: npm run lint

          - repo: microsoft/vscode-azuretools
            pm: npm
            cwd: eng
            install: npm install
            plugin_add: npm install --save-dev
            run: npm run lint

          - repo: microsoft/vscode-containers
            pm: npm
            install: npm install
            plugin_add: npm install --save-dev
            run: npm run lint

          - repo: microsoft/vscode-test-web
            pm: npm
            install: npm install
            plugin_add: npm install --save-dev
            run: npm test

          - repo: online-go/online-go.com
            pm: yarn
            install: yarn install
            plugin_add: yarn add -D --ignore-workspace-root-check
            run: yarn eslint src/

          # disable the project below as it fails to install all its
          # dependencies
          #
          # - repo: salto-io/salto
          #   pm: yarn
          #   install: yarn set version 3.6.4 && yarn install
          #   plugin_add: yarn add -D
          #   run: yarn lint

          - repo: Suwayomi/Suwayomi-WebUI
            pm: yarn
            install: yarn install
            plugin_add: yarn add -D --ignore-workspace-root-check
            run: yarn lint

          - repo: wireapp/wire-webapp
            pm: yarn
            install: yarn install
            plugin_add: yarn add -D
            run: yarn nx run-many -t lint --all

          - repo: wppconnect-team/wa-js
            pm: npm
            install: npm install
            plugin_add: npm install --save-dev
            run: npm run lint

          - repo: wppconnect-team/wa-version
            pm: npm
            install: npm install
            plugin_add: npm install --save-dev
            run: npm run lint

          - repo: wppconnect-team/wppconnect
            pm: npm
            install: npm install
            plugin_add: npm install --save-dev
            run: npm run lint

          - repo: xdan/jodit
            pm: npm
            ref: f6270f1691efd9a5735cb161e957e32c84093e36
            install: npm install
            plugin_add: npm install --save-dev
            run: make lint

    steps:
    - name: Install OS packages
      uses: awalsh128/cache-apt-pkgs-action@v1
      with:
        packages: libx11-dev libxkbfile-dev
        version: 1.0

    - name: Checkout plugin
      uses: actions/checkout@v5
      with:
        ref: ${{ inputs.ref || github.ref }}
        path: plugin

    - name: Enable Corepack
      run: corepack enable

    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24.x'
        cache: 'pnpm'
        cache-dependency-path: 'plugin/pnpm-lock.yaml'

    - name: Build and Pack Plugin
      working-directory: plugin
      run: |
        pnpm install --frozen-lockfile
        pnpm pack
        echo "TARBALL_PATH=$(ls *.tgz | head -n 1)" >> $GITHUB_ENV

    - name: Checkout ${{ matrix.repo }}
      uses: actions/checkout@v5
      with:
        repository: ${{ matrix.repo }}
        ref: ${{ matrix.ref }}
        path: target-repo

    - name: Install target-repo dependencies and plugin
      working-directory: target-repo/${{ matrix.cwd || '.' }}
      run: |
        ${{ matrix.install }}
        ${{ matrix.plugin_add }} ${{ matrix.pkg || '@tony.ganchev/eslint-plugin-header@file:$GITHUB_WORKSPACE/plugin/$TARBALL_PATH' }}
        ${{ matrix.post_install || '' }}

    - name: Run ${{ matrix.repo }} lint
      working-directory: target-repo/${{ matrix.cwd || '.' }}
      run: ${{ matrix.run }}

  test:
    needs: [run-tests, ecosystem-test]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All tests passed!"
