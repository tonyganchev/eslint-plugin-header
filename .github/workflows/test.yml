name: Test
permissions:
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_call:
    inputs:
      ref:
        description: 'The branch, tag or SHA to checkout'
        required: false
        type: string

jobs:

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [eslint, markdownlint, unit, e2e]
    steps:
    - uses: actions/checkout@v5
      with:
        ref: ${{ inputs.ref || github.ref }}
    
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.32.1

    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24.x'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run ${{ matrix.task }}
      run: pnpm ${{ matrix.task }}
