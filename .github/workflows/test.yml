name: Test
permissions:
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_call:
    inputs:
      ref:
        description: 'The branch, tag or SHA to checkout'
        required: false
        type: string

jobs:

  run-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [eslint, markdownlint, unit, e2e]
    steps:
    - uses: actions/checkout@v5
      with:
        ref: ${{ inputs.ref || github.ref }}
    
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.32.1

    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24.x'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run ${{ matrix.task }}
      run: pnpm ${{ matrix.task }}

  ecosystem-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - repo: angular/angular-cli
            pm: pnpm
            install: pnpm install --no-frozen-lockfile
            # Use -w for pnpm workspaces root
            plugin_add: pnpm add -Dw eslint-plugin-header@file:../plugin/$TARBALL_PATH @tony.ganchev/eslint-plugin-header@file:../plugin/$TARBALL_PATH
            run: pnpm run lint
          - repo: wireapp/wire-webapp
            pm: yarn
            install: yarn install
            plugin_add: yarn add -D eslint-plugin-header@file:../plugin/$TARBALL_PATH @tony.ganchev/eslint-plugin-header@file:../plugin/$TARBALL_PATH
            run: yarn nx run-many -t lint --all
          - repo: wppconnect-team/wa-js
            pm: npm
            install: npm install
            plugin_add: npm install --save-dev eslint-plugin-header@file:../plugin/$TARBALL_PATH @tony.ganchev/eslint-plugin-header@file:../plugin/$TARBALL_PATH
            run: npm run lint
          - repo: online-go/online-go.com
            pm: yarn
            install: yarn install
            plugin_add: yarn add -D eslint-plugin-header@file:../plugin/$TARBALL_PATH @tony.ganchev/eslint-plugin-header@file:../plugin/$TARBALL_PATH
            run: yarn eslint src/
          - repo: forcedotcom/salesforcedx-vscode
            pm: npm
            install: npm install
            plugin_add: npm install --save-dev eslint-plugin-header@file:../plugin/$TARBALL_PATH @tony.ganchev/eslint-plugin-header@file:../plugin/$TARBALL_PATH
            run: npm run lint
          - repo: Azure/azure-dev
            pm: npm
            cwd: ext/vscode
            install: npm install
            # Azure/azure-dev has package.json in ext/vscode, so plugin is 2 levels up
            plugin_add: npm install --save-dev eslint-plugin-header@file:../../plugin/$TARBALL_PATH @tony.ganchev/eslint-plugin-header@file:../../plugin/$TARBALL_PATH
            run: npm run lint
          - repo: xdan/jodit
            pm: npm
            install: npm install
            plugin_add: npm install --save-dev eslint-plugin-header@file:../plugin/$TARBALL_PATH @tony.ganchev/eslint-plugin-header@file:../plugin/$TARBALL_PATH
            run: make lint

    steps:
    - name: Checkout plugin
      uses: actions/checkout@v5
      with:
        ref: ${{ inputs.ref || github.ref }}
        path: plugin

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.32.1

    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24.x'

    - name: Build and Pack Plugin
      working-directory: plugin
      run: |
        pnpm install --frozen-lockfile
        pnpm pack
        echo "TARBALL_PATH=$(ls *.tgz | head -n 1)" >> $GITHUB_ENV

    - name: Checkout ${{ matrix.repo }}
      uses: actions/checkout@v5
      with:
        repository: ${{ matrix.repo }}
        path: target-repo

    - name: Install target-repo dependencies and plugin
      working-directory: target-repo/${{ matrix.cwd || '.' }}
      run: |
        ${{ matrix.install }}
        ${{ matrix.plugin_add }}

    - name: Run ${{ matrix.repo }} lint
      working-directory: target-repo/${{ matrix.cwd || '.' }}
      run: ${{ matrix.run }}

  test:
    needs: [run-tests, ecosystem-test]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All tests passed!"
